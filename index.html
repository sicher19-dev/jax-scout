<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Griffin Jax — Scouting Report vs Royals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --field:#091019; --panel:#0f1d31; --panel2:#0b1626; --inset:#0a1422;
  --line:#1d3656; --line2:#142943;
  --navy:#092C5C; --sky:#8FBCE6; --gold:#F5D130;
  --ink:#e9f0f8; --mut:#7f99b6; --mut2:#5c7596;
  --hi:#cfe3f7;
  --good:#2f7db5; --bad:#d2492f;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--field);color:var(--ink);font-family:'Archivo',system-ui,sans-serif;
  line-height:1.5;padding-bottom:48px;
  background-image:radial-gradient(900px 500px at 80% -10%, rgba(143,188,230,.06), transparent 60%);}
.wrap{max-width:980px;margin:0 auto;padding:0 16px}
.mono{font-family:'JetBrains Mono',monospace}
h1,h2,h3{font-family:'Archivo Black',sans-serif;font-weight:400;letter-spacing:-.01em}

/* ---------- header ---------- */
header{background:linear-gradient(160deg,#0c213f 0%,#091019 90%);border-bottom:2px solid var(--sky);
  padding:26px 0 22px;position:relative;overflow:hidden}
header::after{content:"";position:absolute;right:-60px;top:-40px;width:240px;height:240px;
  background:radial-gradient(circle,rgba(143,188,230,.10),transparent 70%)}
.eyebrow{font-size:11px;letter-spacing:.34em;color:var(--sky);text-transform:uppercase;font-weight:700}
.title{font-size:clamp(34px,7vw,54px);line-height:.96;margin:8px 0 4px;
  background:linear-gradient(90deg,#ffffff,var(--sky));-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent}
.pmeta{font-size:13px;color:var(--mut);font-weight:600}
.pmeta b{color:var(--hi)}
.matchup{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
.chip{font-family:'JetBrains Mono',monospace;font-size:11.5px;border:1px solid var(--line);
  background:var(--panel2);padding:6px 10px;border-radius:6px;color:var(--hi)}
.chip .k{color:var(--mut)}
.season{margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--sky)}
.season .n{color:var(--mut)}

/* ---------- tabs ---------- */
nav{position:sticky;top:0;z-index:30;background:rgba(9,16,25,.95);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line2)}
.tabs{display:flex;gap:2px;max-width:980px;margin:0 auto;padding:0 12px}
.tab{flex:1;text-align:center;padding:13px 6px;font-family:'JetBrains Mono',monospace;font-size:12px;
  letter-spacing:.12em;text-transform:uppercase;color:var(--mut);cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;transition:.15s;font-weight:500}
.tab:hover{color:var(--hi)}
.tab.on{color:var(--sky);border-bottom-color:var(--sky)}

main{padding-top:22px}
.view{display:none;animation:fade .25s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---------- generic cards ---------- */
.card{background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:18px 18px;margin-bottom:14px}
.lbl{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--mut);margin-bottom:9px;display:flex;align-items:center;gap:8px}
.lbl::before{content:"";width:14px;height:2px;background:var(--sky)}

/* ---------- thesis hero ---------- */
.thesis{background:linear-gradient(155deg,#10294b,#0b1626);border:1px solid var(--line);
  border-left:4px solid var(--sky);border-radius:12px;padding:20px;margin-bottom:14px}
.thesis .big{font-family:'Archivo Black';font-size:clamp(19px,3.6vw,26px);line-height:1.12;margin-bottom:8px}
.thesis .big em{color:var(--sky);font-style:normal}
.thesis p{color:#c5d6ea;font-size:14.5px}
.t30{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;color:var(--gold);
  text-transform:uppercase;margin-bottom:10px}

/* ---------- engine split ---------- */
.split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:620px){.split{grid-template-columns:1fr}}
.eng{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:15px}
.eng h3{font-size:14px;margin-bottom:3px}
.eng .who{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mut);margin-bottom:11px}
.eng .pair{display:flex;align-items:center;gap:9px;margin:7px 0;font-size:13.5px;color:#cfdcec}
.dot{width:10px;height:10px;border-radius:50%;flex:none}
.eng .lead{color:var(--sky);font-weight:700}
.vR{border-top:3px solid var(--gold)} .vL{border-top:3px solid var(--sky)}

/* ---------- quick hits table ---------- */
.qh{width:100%;border-collapse:collapse;font-size:13.5px}
.qh th{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mut);text-align:left;padding:7px 8px;border-bottom:1px solid var(--line2);font-weight:500}
.qh td{padding:9px 8px;border-bottom:1px solid var(--line2);vertical-align:middle}
.qh tr:last-child td{border-bottom:none}
.qh .slot{font-family:'JetBrains Mono';color:var(--mut);font-size:12px}
.qh .nm{font-weight:700;cursor:pointer}
.qh .nm:hover{color:var(--sky)}
.qh .bb{font-family:'JetBrains Mono';font-size:10px;color:var(--mut);border:1px solid var(--line2);
  border-radius:4px;padding:1px 5px;margin-left:6px}
.qh .plan{color:#bccfe3;font-size:12.5px}
.tdot{display:inline-block;width:9px;height:9px;border-radius:50%}
.thi{background:var(--bad)} .tmed{background:var(--gold)} .tlow{background:#3f8e5a}

/* ---------- witt watch ---------- */
.watch{background:linear-gradient(150deg,#2a1c08,#15120a);border:1px solid #4a3a12;
  border-left:4px solid var(--gold);border-radius:12px;padding:18px;margin-bottom:14px}
.watch .flag{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.2em;color:var(--gold);
  text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.watch h3{font-size:17px;margin-bottom:6px}
.watch p{color:#e6d6ad;font-size:13.5px;margin-bottom:6px}
.watch .meta{font-family:'JetBrains Mono';font-size:11px;color:#b79a52}

/* ---------- arsenal table ---------- */
.ars{width:100%;border-collapse:collapse;font-size:13px}
.ars th{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--mut);padding:8px 6px;border-bottom:1px solid var(--line2);font-weight:500;text-align:right}
.ars th:first-child,.ars th:nth-child(2){text-align:left}
.ars td{padding:10px 6px;border-bottom:1px solid var(--line2);text-align:right;font-family:'JetBrains Mono';font-size:12.5px}
.ars td:first-child,.ars td:nth-child(2){text-align:left;font-family:'Archivo'}
.ars tr:last-child td{border-bottom:none}
.pname{font-weight:700;display:flex;align-items:center;gap:8px}
.prole{font-size:10.5px;color:var(--mut);font-family:'JetBrains Mono'}
.ubar{position:relative;height:5px;background:var(--inset);border-radius:3px;margin-top:4px;width:74px;margin-left:auto}
.ufill{position:absolute;left:0;top:0;height:100%;border-radius:3px}

/* ---------- sequencing ---------- */
.seq{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:620px){.seq{grid-template-columns:1fr}}
.step{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:14px;position:relative}
.step .n{font-family:'Archivo Black';font-size:30px;color:var(--line);line-height:1;position:absolute;top:10px;right:12px}
.step .t{font-family:'JetBrains Mono';font-size:11px;letter-spacing:.1em;color:var(--sky);text-transform:uppercase;margin-bottom:7px}
.step p{font-size:13px;color:#c5d6ea}
.rules{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:16px;margin-top:12px}
.rule{display:flex;gap:12px;margin:11px 0;align-items:flex-start}
.rule .rn{font-family:'Archivo Black';color:var(--gold);font-size:16px;flex:none;width:20px}
.rule b{color:var(--hi)}
.rule p{font-size:13.5px;color:#c2d3e7}
.clog{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
.clog .c{flex:1;min-width:150px;background:var(--inset);border:1px solid var(--line2);border-radius:8px;padding:11px 13px}
.clog .c .h{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sky);margin-bottom:4px}
.clog .c p{font-size:12.5px;color:#c2d3e7}

/* ---------- lineup cards ---------- */
.lgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:720px){.lgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:430px){.lgrid{grid-template-columns:1fr}}
.lc{background:var(--panel);border:1px solid var(--line2);border-radius:11px;padding:13px;cursor:pointer;
  transition:.15s;position:relative}
.lc:hover{border-color:var(--sky);transform:translateY(-2px)}
.lc .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.lc .slot{font-family:'JetBrains Mono';font-size:11px;color:var(--mut)}
.lc .nm{font-family:'Archivo Black';font-size:15px;line-height:1.05;margin-bottom:2px}
.lc .sub{font-family:'JetBrains Mono';font-size:10.5px;color:var(--mut);margin-bottom:9px}
.lc .kill{font-size:12px;color:#bccfe3}
.lc .kill .kl{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);display:block;margin-bottom:1px}
.lc .arrow{font-family:'JetBrains Mono';font-size:10px;color:var(--sky);margin-top:9px}
.flagchip{position:absolute;top:11px;right:11px;font-family:'JetBrains Mono';font-size:8.5px;
  letter-spacing:.08em;background:rgba(210,73,47,.16);color:#f0a08c;border:1px solid #6b2c1f;
  padding:2px 6px;border-radius:4px}

/* ---------- hitter detail ---------- */
.back{font-family:'JetBrains Mono';font-size:12px;color:var(--sky);background:none;border:none;cursor:pointer;
  padding:6px 0;margin-bottom:6px;display:inline-flex;align-items:center;gap:6px}
.dhdr{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:4px}
.dhdr .jersey{font-family:'Archivo Black';font-size:40px;color:var(--line);line-height:1}
.dhdr h2{font-size:25px;line-height:1}
.dhdr .meta{font-family:'JetBrains Mono';font-size:11.5px;color:var(--mut)}
.dthreat{margin-left:auto;font-family:'JetBrains Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  padding:5px 10px;border-radius:6px;font-weight:700}
.statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.stat{background:var(--inset);border:1px solid var(--line2);border-radius:9px;padding:11px;text-align:center}
.stat .v{font-family:'JetBrains Mono';font-weight:700;font-size:18px;color:var(--hi)}
.stat .k{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-top:3px}
.dcols{display:grid;grid-template-columns:130px 1fr;gap:14px}
@media(max-width:560px){.dcols{grid-template-columns:1fr}}
.zone{display:flex;flex-direction:column;gap:3px}
.zone .zc{padding:13px 8px;border-radius:7px;text-align:center;color:#06101c;font-weight:700;font-family:'JetBrains Mono';font-size:12px;position:relative}
.zone .zc .zl{font-size:8.5px;letter-spacing:.1em;opacity:.7;display:block;font-weight:500}
.fam{display:flex;flex-direction:column;gap:11px;justify-content:center}
.frow .fh{display:flex;justify-content:space-between;font-family:'JetBrains Mono';font-size:11px;margin-bottom:3px}
.frow .fh .fn{color:var(--hi)} .frow .fh .fv{color:var(--mut)}
.fbar{height:9px;background:var(--inset);border-radius:5px;position:relative;overflow:hidden}
.fbar .ff{position:absolute;left:0;top:0;height:100%;border-radius:5px}
.killbox{background:linear-gradient(120deg,#0c2547,#0b1626);border:1px solid var(--line);border-radius:10px;
  padding:13px 15px;margin:13px 0;display:flex;align-items:center;gap:13px}
.killbox .kl{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut)}
.killbox .kv{font-family:'Archivo Black';font-size:17px;color:var(--sky)}
.killbox .pp{display:flex;gap:6px;margin-left:auto}
.pp .pc{font-family:'JetBrains Mono';font-size:11px;padding:4px 9px;border-radius:6px;font-weight:700;color:#06101c}
.aa{margin:12px 0}
.aa .t{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px}
.aa.atk .t{color:#4fae7a}.aa.avd .t{color:#e07a5f}
.aa p{font-size:13.5px;color:#c8d8ea}
.dnote{margin-top:12px;font-family:'JetBrains Mono';font-size:11px;letter-spacing:.06em;color:#f0c14b;
  background:rgba(245,209,48,.07);border:1px solid #4a3a12;border-radius:7px;padding:9px 12px}

footer{max-width:980px;margin:30px auto 0;padding:18px 16px 0;border-top:1px solid var(--line2);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
footer .b{font-family:'Archivo Black';font-size:13px;color:var(--mut)}
footer .b span{color:var(--sky)}
footer .m{font-family:'JetBrains Mono';font-size:10px;color:var(--mut2);letter-spacing:.06em}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-family:'JetBrains Mono';font-size:10px;color:var(--mut);margin-top:10px}
.legend .li{display:flex;align-items:center;gap:5px}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="eyebrow">No Brand Baseball Analytics</div>
    <h1 class="title" id="pTitle">GRIFFIN JAX</h1>

/* ---- color scale: pitcher's POV (low xwOBA = blue/good, high = red/danger) ---- */
function lerp(a,b,t){return Math.round(a+(b-a)*t)}
function mix(c1,c2,t){return `rgb(${lerp(c1[0],c2[0],t)},${lerp(c1[1],c2[1],t)},${lerp(c1[2],c2[2],t)})`}
function heat(v){
  if(v==null) return '#22324a'; // guard
  const cool=[40,118,180], midc=[78,93,120], hot=[210,73,47];
  let t=(v-0.220)/(0.440-0.220); t=Math.max(0,Math.min(1,t));
  return t<0.5 ? mix(cool,midc,t/0.5) : mix(midc,hot,(t-0.5)/0.5);
}
function fmt(v){return v==null?'—':v.toFixed(3).replace(/^0/,'')}
function tcls(t){return t==='HIGH'?'thi':t==='MED'?'tmed':'tlow'}
function tColor(t){return t==='HIGH'?'#d2492f':t==='MED'?'#F5D130':'#3f8e5a'}

      </div>
    </div>
    <div class="killbox"><div><div class="kl">Kill pitch</div><div class="kv">${x.kill}</div></div><div class="pp">${pp}</div></div>
    <div class="aa atk"><div class="t">▸ Attack</div><p>${x.attack}</p></div>
    <div class="aa avd"><div class="t">▸ Avoid</div><p>${x.avoid}</p></div>
    ${x.note?`<div class="dnote">▲ ${x.note}</div>`:''}
  </div>`;
}
function openHitter(id){
  const x=DATA.hitters.find(h=>h.id===id)||(DATA.witt.id===id?DATA.witt:null);
  if(!x) return;
  document.getElementById('v-hitter').innerHTML=hitterDetail(x);
  showView('hitter');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ================= NAV ================= */
function showView(v){
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('on'));
  document.getElementById('v-'+v).classList.add('on');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v===v));
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{showView(t.dataset.v);window.scrollTo({top:0,behavior:'smooth'});}));

/* ================= INIT ================= */
header(); renderBrief(); renderPlan(); renderLineup();
</script>
</body>
</html>
